<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in — TaskNova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-body auth-body--login">

  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <img
        src="{{ url_for('static', filename='img/logo.png') }}"
        alt="TaskNova logo"
        class="app-logo app-logo--auth"/>
      <span class="auth-app-name">TaskNova</span>
    </div>
    <p class="auth-subtitle">Sign in to your planner</p>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Form -->
    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input
          type="email"
          name="email"
          class="form-input"
          placeholder="you@example.com"
          autocomplete="email"
          required/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          name="password"
          class="form-input"
          placeholder="••••••••"
          autocomplete="current-password"
          required/>
      </div>

      <button type="submit" class="btn-auth">Sign in</button>
    </form>

    <p class="auth-footer">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" class="auth-link">Create one</a>
    </p>

    <!-- Demo hint -->
    <div class="demo-hint">
      <span class="demo-label">Demo account</span>
      <span>demo@weeklyai.com &nbsp;/&nbsp; demo1234</span>
    </div>

  </div>

</body>
</html>
